# Nom........ : render.yaml (Ref. https://render.com/docs/blueprint-spec)
# Description : Déploie 2 services : veille-scientifique-api -> service web Flask (API + bdd.db)
#               veille-scientifique-front  -> site statique (index.html, app.js, ...)
# Usage...... : Pousse ce dépôt (avec ces fichiers à la racine) sur GitHub.
#               Sur Render : New > Blueprint > sélectionne ce dépôt > Deploy Blueprint.
# INFO SUR BLUEPRINT : https://render.com/docs/infrastructure-as-code

services:
  # ------------------------------------------------------------------------
  # 1) API Flask (creer_bdd.py / alimenter_bdd.py ne tournent pas ici :
  #    bdd.db (~1 Go) est téléchargé depuis une Release GitHub au moment du build)
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "bash installPythonReq_downloadDB.sh"
    startCommand: "gunicorn api_flask:application --timeout 120"
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_DOWNLOAD_URL
        value: https://github.com/MaelKonde/RealisationDeProgramme/releases/download/v1-db/bdd.db

  # ------------------------------------------------------------------------
  # 2) Front-end statique (index.html + style.css + app.js + config.js + data_AccessAPI_Flask.js)
  #    Adapte "staticPublishPath" si les fichiers ne sont pas dans /public
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-front
    runtime: static
    buildCommand: "echo 'Site statique - aucun build necessaire'"
    staticPublishPath: ./
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html