##############################################################################
# render.yaml — Blueprint pour le projet "Veille Scientifique"
#
# Déploie 2 services :
#   1. veille-scientifique-api    -> service web Flask (API + bdd.db)
#   2. veille-scientifique-front  -> site statique (index.html, app.js, ...)
#
# Utilisation :
#   1. Pousse ce dépôt (avec ces fichiers à la racine) sur GitHub.
#   2. Sur Render : New > Blueprint > sélectionne ce dépôt > Deploy Blueprint.
##############################################################################

services:
  # ------------------------------------------------------------------------
  # 1) API Flask (creer_bdd.py / alimenter_bdd.py ne tournent pas ici :
  #    bdd.db (~1 Go) est téléchargé depuis Google Drive au moment du build)
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "bash build.sh"
    startCommand: "gunicorn api_flask:application"
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GDRIVE_DB_FILE_ID
        value: 120wyznKkDMfXWVANr_f8he4t2AMGhhVX

  # ------------------------------------------------------------------------
  # 2) Front-end statique (index.html + style.css + app.js + config.js + data.js)
  #    Adapte "staticPublishPath" si tes fichiers ne sont pas dans /public
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-front
    runtime: static
    buildCommand: "echo 'Site statique - aucun build necessaire'"
    staticPublishPath: ./
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
